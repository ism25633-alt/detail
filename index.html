<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0c0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Detail Co.</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --surface-hi: #1a1a1a;
    --border: #222;
    --border-hi: #2a2a2a;
    --text: #e8e6e3;
    --text-dim: #888581;
    --text-mute: #4a4744;
    --accent: #d97706;
    --accent-text: #000;
    --green: #15803d;
    --red: #b91c1c;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
    --map-filter: invert(1) hue-rotate(200deg) brightness(0.95) contrast(0.85);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; }
  button, input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }

  #app { padding-bottom: 78px; min-height: 100vh; }

  /* Typography helpers */
  .mono { font-family: var(--mono); }
  .serif { font-family: var(--serif); }
  .label { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; color: var(--text-mute); }
  .h1 { font-family: var(--serif); font-size: 28px; font-weight: 500; letter-spacing: -0.5px; }
  .h2 { font-family: var(--serif); font-size: 20px; font-weight: 500; }
  .accent { color: var(--accent); }

  /* Sections */
  .page { padding: 32px 20px 20px; }
  .section-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 3px; color: var(--text-mute);
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); padding: 16px; }
  .card.hi { background: var(--surface-hi); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 12px 16px; cursor: pointer; font-family: var(--mono);
    font-size: 10px; letter-spacing: 2px; transition: all 0.15s;
  }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); font-weight: 600; }
  .btn.full { width: 100%; }
  .btn.lg { padding: 16px; font-size: 11px; letter-spacing: 3px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Inputs */
  input[type="text"], input[type="tel"], input[type="number"], textarea {
    width: 100%; padding: 14px 16px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-mute); }

  /* Tabs nav */
  #tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    display: flex; padding: 6px 0 14px; z-index: 100;
  }
  .tab {
    flex: 1; background: none; border: none; padding: 10px 6px; cursor: pointer;
    color: var(--text-mute); font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px;
    position: relative;
  }
  .tab.active { color: var(--text); }
  .tab .underline {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 0; height: 2px; background: var(--accent); transition: width 0.2s;
  }
  .tab.active .underline { width: 20px; }

  /* Bottom nav (in active job) */
  .bottom-action {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg); border-top: 1px solid var(--border); padding: 12px 20px;
  }

  /* Job card */
  .job-card {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    padding: 14px 16px; margin-bottom: 8px; cursor: pointer; text-align: left;
    display: flex; justify-content: space-between; align-items: center;
  }
  .job-card .name { font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job-card .meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  .job-card .price { font-family: var(--serif); font-size: 18px; font-weight: 500; }
  .job-card .duration { font-family: var(--mono); font-size: 9px; color: var(--text-mute); letter-spacing: 1px; margin-top: 2px; text-align: right; }

  /* Goal card */
  .goal-card { padding: 20px; }
  .goal-card .amount { font-family: var(--serif); font-size: 42px; line-height: 1; font-weight: 500; letter-spacing: -1px; }
  .goal-card .of { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .progress {
    height: 2px; background: var(--surface-hi); margin-top: 14px;
  }
  .progress-fill {
    height: 100%; background: var(--accent); transition: width 0.4s ease;
  }

  /* Checkbox */
  .check {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1px solid var(--border-hi); background: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--accent-text); border-radius: 2px;
  }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.warn { border-color: var(--red); }

  /* Service tabs (active job) */
  .svc-tabs { display: flex; overflow-x: auto; }
  .svc-tab {
    background: none; border: none; padding: 10px 12px;
    color: var(--text-dim); font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
    cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent;
  }
  .svc-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* Item row */
  .item-row {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: opacity 0.2s;
  }
  .item-row.done { opacity: 0.35; }
  .item-row.done .item-text { text-decoration: line-through; }
  .item-text { font-size: 14px; line-height: 1.4; }
  .item-text.warn { color: var(--red); }

  /* Theme picker */
  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .theme-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 14px; cursor: pointer; text-align: left; min-height: 100px;
    position: relative;
  }
  .theme-card.active { border-color: var(--accent); }
  .theme-card .check-dot {
    position: absolute; top: 10px; right: 10px;
    width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--border-hi);
  }
  .theme-card.active .check-dot { background: var(--accent); border-color: var(--accent); }
  .theme-name { font-family: var(--serif); font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .theme-desc { font-family: var(--mono); font-size: 9px; color: var(--text-mute); letter-spacing: 1px; }
  .theme-swatches { display: flex; gap: 4px; margin-top: 10px; }
  .swatch { width: 14px; height: 14px; border: 1px solid rgba(255,255,255,0.1); }

  /* Map */
  #routes-map { position: fixed; top: 0; left: 0; right: 0; bottom: 78px; background: var(--bg); }
  .leaflet-tile-pane { filter: var(--map-filter); }
  .leaflet-control-attribution {
    background: rgba(0,0,0,0.6) !important; color: var(--text-mute) !important; font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
  .pin-home { background: var(--accent); width: 18px; height: 18px; }
  .pin-customer { background: var(--green); }
  .pin-followup { background: var(--accent); }

  /* Route panels */
  #route-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    background: linear-gradient(180deg, rgba(12,12,12,0.95), rgba(12,12,12,0.4));
    padding: 14px 16px 18px; pointer-events: none;
  }
  #route-top > * { pointer-events: auto; }
  #route-modes { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
  .route-mode {
    flex: 1; min-width: 60px; padding: 8px 6px;
    background: rgba(20,20,20,0.85); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
    cursor: pointer; text-align: center;
  }
  .route-mode.active { color: var(--text); border-color: var(--accent); background: var(--surface-hi); }

  #route-bottom {
    position: fixed; bottom: 78px; left: 0; right: 0; z-index: 500;
    background: rgba(12,12,12,0.95); border-top: 1px solid var(--border);
    padding: 12px 16px;
  }
  #route-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
  .rstat { background: var(--surface); border: 1px solid var(--border); padding: 8px 4px; text-align: center; }
  .rstat-label { font-family: var(--mono); font-size: 7px; letter-spacing: 1.5px; color: var(--text-mute); }
  .rstat-val { font-family: var(--serif); font-size: 16px; font-weight: 500; margin-top: 2px; }

  /* Range slider */
  input[type="range"] {
    width: 100%; -webkit-appearance: none; background: transparent; height: 20px;
  }
  input[type="range"]::-webkit-slider-runnable-track { height: 2px; background: var(--border-hi); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    background: var(--accent); border-radius: 50%; margin-top: -7px; cursor: pointer;
  }
  input[type="range"]::-moz-range-track { height: 2px; background: var(--border-hi); }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; background: var(--accent); border-radius: 50%; border: none;
  }

  /* Toast */
  #toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(12,12,12,0.97); border: 1px solid var(--accent);
    padding: 14px 22px; z-index: 9999; font-family: var(--mono); font-size: 11px;
    letter-spacing: 2px; max-width: 80%; text-align: center; display: none;
  }
  #toast.show { display: block; }

  /* Empty state */
  .empty {
    margin-top: 60px; padding: 40px; text-align: center;
    font-family: var(--serif); font-style: italic; color: var(--text-mute); font-size: 16px;
  }
  .empty-sub { font-size: 12px; font-family: var(--mono); font-style: normal; letter-spacing: 1px; display: block; margin-top: 6px; }

  /* Photos grid */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .photo {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    border: 1px solid var(--border);
  }
  .photo-add {
    aspect-ratio: 1; background: var(--surface); border: 1px dashed var(--border-hi);
    color: var(--text-mute); font-size: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-wrap { position: relative; }
  .photo-x {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.7); border: none; color: var(--text); font-size: 11px; cursor: pointer;
  }

  /* Misc */
  .row { display: flex; justify-content: space-between; align-items: center; }
  .gap-8 { gap: 8px; }
  .mt-12 { margin-top: 12px; }
  .mt-20 { margin-top: 20px; }
  .mt-24 { margin-top: 24px; }
  .mt-32 { margin-top: 32px; }
</style>
</head>

<div id="app"></div>
<nav id="tabs"></nav>
<div id="toast"></div>

function applyTheme(name) {
  const theme = THEMES[name] || THEMES.industrial;
  Object.entries(theme.vars).forEach(([k, v]) => {
    document.documentElement.style.setProperty(k, v);
  });
  document.querySelector('meta[name="theme-color"]').setAttribute('content', theme.vars['--bg']);
}

const DEFAULT_SUPPLIES = [
  "Pedal Suds car soap", "P&S Brake Buster", "Dark Fury", "Iron remover", "Spray ceramic coating",
  "Koch-Chemie MZR", "P&S Carpet Bomber", "P&S interior cleaner", "Nanoskin Blue Dress",
  "Meguiar's tire dressing", "Microfiber towels", "0000 steel wool", "Tar remover", "UV headlight sealant",
];

// ════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════
const STORAGE_KEY = "detail-co-v3";

const defaultState = () => ({
  theme: "industrial",
  view: "jobs",
  activeJob: null,
  showNewJob: false,
  newJobStep: 1,
  newJobData: { package: null, addons: [], customerName: "", customerPhone: "", carInfo: "" },
  data: {
    jobs: [],
    supplies: DEFAULT_SUPPLIES.map((name, i) => ({ id: `s${i}`, name, lowStock: false })),
    goal: 5500,
    goalName: "Sur-Ron Ultra Bee",
    route: { home: null, radius: 0.5, streets: [], pins: [] },
  },
  quote: { package: null, addons: [] },
  routeMode: "home",
});

let state = defaultState();
let saveTimer = null;

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const persist = { theme: state.theme, data: state.data };
    try { await window.storage.set(STORAGE_KEY, JSON.stringify(persist)); } catch (e) { console.warn(e); }
  }, 300);
}

async function load() {
  try {
    const res = await window.storage.get(STORAGE_KEY);
    if (res && res.value) {
      const saved = JSON.parse(res.value);
      if (saved.theme) state.theme = saved.theme;
      if (saved.data) state.data = { ...state.data, ...saved.data };
    }
  } catch (e) {}
}

function setState(updater) {
  if (typeof updater === 'function') updater(state);
  else Object.assign(state, updater);
  save();
  render();
}

// ════════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════════
function fmtTime(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function fmtDur(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function buildChecked(services) {
  const c = {};
  services.forEach((k) => {
    ALL[k].sections.forEach((sec) => sec.items.forEach((_, i) => { c[`${sec.id}-${i}`] = false; }));
  });
  return c;
}
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') node.className = v;
    else if (k === 'style') Object.assign(node.style, v);
    else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') node.innerHTML = v;
    else node.setAttribute(k, v);
  });
  children.flat().forEach((c) => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

let toastTimer = null;
function toast(msg, ms = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  if (ms > 0) toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

// ════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════
function render() {
  applyTheme(state.theme);
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (state.activeJob) { renderActiveJob(app); return; }
  if (state.showNewJob) { renderNewJob(app); return; }

  if (state.view === 'jobs') renderJobs(app);
  else if (state.view === 'quote') renderQuote(app);
  else if (state.view === 'routes') renderRoutes(app);
  else if (state.view === 'more') renderMore(app);

  renderTabs();
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const items = [
    { id: 'jobs', label: 'JOBS' },
    { id: 'routes', label: 'ROUTES' },
    { id: 'quote', label: 'QUOTE' },
    { id: 'more', label: 'MORE' },
  ];
  tabs.innerHTML = '';
  items.forEach((t) => {
    const active = state.view === t.id;
    const btn = el('button', {
      class: 'tab' + (active ? ' active' : ''),
      onClick: () => setState({ view: t.id }),
    },
      el('span', { class: 'underline' }),
      t.label,
    );
    tabs.appendChild(btn);
  });
  tabs.style.display = state.activeJob ? 'none' : 'flex';
}

// ════════════════════════════════════════════════════════════════════
// JOBS VIEW
// ════════════════════════════════════════════════════════════════════
function renderJobs(root) {
  const completed = state.data.jobs.filter((j) => j.completed);
  const totalEarned = completed.reduce((s, j) => s + j.total, 0);
  const inProgress = state.data.jobs.filter((j) => !j.completed);
  const recent = completed.slice(0, 5);
  const pct = Math.min(100, (totalEarned / state.data.goal) * 100);

  const page = el('div', { class: 'page' });

  page.appendChild(el('div', { class: 'label' }, 'DETAIL CO.'));
  page.appendChild(el('div', { class: 'h1' }, 'Today', el('span', { class: 'accent' }, '.')));

  // Goal card
  const goal = el('div', { class: 'card goal-card mt-24' });
  goal.appendChild(el('div', { class: 'label' }, 'TOTAL EARNED'));
  goal.appendChild(el('div', { class: 'row', style: { alignItems: 'baseline', gap: '8px', marginTop: '6px' } },
    el('div', { class: 'amount' }, `$${totalEarned}`),
    el('div', { class: 'of' }, ` / $${state.data.goal}`),
  ));
  const prog = el('div', { class: 'progress' });
  prog.appendChild(el('div', { class: 'progress-fill', style: { width: pct + '%' } }));
  goal.appendChild(prog);
  goal.appendChild(el('div', { class: 'row mono', style: { marginTop: '8px', fontSize: '11px', color: 'var(--text-dim)' } },
    el('span', {}, state.data.goalName),
    el('span', {}, Math.round(pct) + '%'),
  ));
  page.appendChild(goal);

  // Start new
  page.appendChild(el('button', {
    class: 'btn primary full lg mt-20',
    onClick: () => setState({ showNewJob: true, newJobStep: 1, newJobData: { package: null, addons: [], customerName: '', customerPhone: '', carInfo: '' } }),
  },
    el('span', {}, 'START NEW JOB'),
    el('span', { style: { marginLeft: 'auto', fontSize: '18px' } }, '→'),
  ));

  // In progress
  if (inProgress.length > 0) {
    page.appendChild(el('div', { class: 'mt-32' },
      el('div', { class: 'section-label' }, 'IN PROGRESS'),
      ...inProgress.map((j) => makeJobCard(j, false)),
    ));
  }

  // Recent
  if (recent.length > 0) {
    page.appendChild(el('div', { class: 'mt-32' },
      el('div', { class: 'section-label' }, 'RECENT JOBS'),
      ...recent.map((j) => makeJobCard(j, true)),
    ));
  }

  if (state.data.jobs.length === 0) {
    page.appendChild(el('div', { class: 'empty' },
      'No jobs yet.',
      el('span', { class: 'empty-sub' }, 'Tap above to detail your first car.'),
    ));
  }

  root.appendChild(page);
}

function makeJobCard(job, done) {
  const pkg = ALL[job.package];
  return el('button', {
    class: 'job-card',
    onClick: () => openActiveJob(job),
  },
    el('div', { style: { flex: '1', minWidth: '0' } },
      el('div', { class: 'name' }, job.customerName || 'Unnamed',
        job.carInfo ? el('span', { style: { color: 'var(--text-dim)', fontSize: '12px' } }, ` · ${job.carInfo}`) : null,
      ),
      el('div', { class: 'meta' },
        `${pkg.label.toUpperCase()}${job.addons.length > 0 ? ' +' + job.addons.length : ''} · ${fmtDate(job.createdAt)}`),
    ),
    el('div', { style: { textAlign: 'right', marginLeft: '12px' } },
      el('div', { class: 'price', style: { color: done ? 'var(--green)' : 'var(--accent)' } }, `$${job.total}`),
      el('div', { class: 'duration' }, done ? fmtDur(job.durationSecs) : 'IN PROGRESS'),
    ),
  );
}

function openActiveJob(job) {
  state.activeJob = { ...job, _timerSecs: job.durationSecs || 0, _running: !job.completed };
  state.activeJob._activeService = job.package;
  state.activeJob._activeSection = ALL[job.package].sections[0].id;
  render();
  startJobTimer();
}

// ════════════════════════════════════════════════════════════════════
// NEW JOB FLOW
// ════════════════════════════════════════════════════════════════════
function renderNewJob(root) {
  const page = el('div', { class: 'page' });
  page.appendChild(el('button', {
    class: 'btn',
    style: { background: 'none', border: 'none', color: 'var(--text-mute)', padding: '0', marginBottom: '20px' },
    onClick: () => setState({ showNewJob: false }),
  }, '← CANCEL'));

  page.appendChild(el('div', { class: 'h1' }, 'New job', el('span', { class: 'accent' }, '.')));
  page.appendChild(el('div', { class: 'label mt-12' }, `STEP ${state.newJobStep} OF 2`));

  if (state.newJobStep === 1) {
    page.appendChild(renderStep1());
  } else {
    page.appendChild(renderStep2());
  }

  root.appendChild(page);
}

function renderStep1() {
  const wrap = el('div', { class: 'mt-24' });
  wrap.appendChild(el('div', { class: 'section-label' }, 'PACKAGE'));

  Object.entries(PACKAGES).forEach(([key, pkg]) => {
    const selected = state.newJobData.package === key;
    wrap.appendChild(el('button', {
      class: 'card' + (selected ? ' hi' : ''),
      style: {
        width: '100%', padding: '18px', marginBottom: '10px', cursor: 'pointer', textAlign: 'left',
        border: `1px solid ${selected ? 'var(--accent)' : 'var(--border)'}`,
      },
      onClick: () => setState((s) => { s.newJobData.package = key; }),
    },
      el('div', { class: 'row', style: { alignItems: 'flex-start' } },
        el('div', {},
          el('div', { class: 'h2' }, pkg.label),
          el('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--text-dim)', marginTop: '4px', letterSpacing: '1px' } }, `~${pkg.estMinutes} MIN`),
        ),
        el('div', { class: 'serif', style: { fontSize: '22px', fontWeight: '500' } }, `$${pkg.price}`),
      ),
    ));
  });

  wrap.appendChild(el('div', { class: 'section-label mt-24' }, 'ADD-ONS (OPTIONAL)'));

  Object.entries(ADDONS).forEach(([key, a]) => {
    const sel = state.newJobData.addons.includes(key);
    wrap.appendChild(el('button', {
      class: 'card' + (sel ? ' hi' : ''),
      style: {
        width: '100%', padding: '14px 16px', marginBottom: '8px', cursor: 'pointer', textAlign: 'left',
        border: `1px solid ${sel ? 'var(--accent)' : 'var(--border)'}`,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      },
      onClick: () => setState((s) => {
        const i = s.newJobData.addons.indexOf(key);
        if (i >= 0) s.newJobData.addons.splice(i, 1);
        else s.newJobData.addons.push(key);
      }),
    },
      el('div', {},
        el('div', { style: { fontSize: '14px' } }, a.label),
        el('div', { class: 'mono', style: { fontSize: '9px', color: 'var(--text-mute)', marginTop: '2px', letterSpacing: '1px' } }, `+$${a.price} · ~${a.estMinutes}M`),
      ),
      el('div', { class: 'check' + (sel ? ' checked' : '') }, sel ? '✓' : ''),
    ));
  });

  if (state.newJobData.package) {
    const total = [state.newJobData.package, ...state.newJobData.addons].reduce((s, k) => s + ALL[k].price, 0);
    const estMin = [state.newJobData.package, ...state.newJobData.addons].reduce((s, k) => s + ALL[k].estMinutes, 0);

    wrap.appendChild(el('div', {
      style: { position: 'fixed', bottom: '78px', left: 0, right: 0, background: 'var(--bg)', borderTop: '1px solid var(--border)', padding: '14px 20px' },
    },
      el('div', { class: 'row', style: { marginBottom: '10px' } },
        el('div', {},
          el('div', { class: 'label' }, 'TOTAL'),
          el('div', { class: 'serif', style: { fontSize: '24px', fontWeight: '500' } }, `$${total}`),
        ),
        el('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--text-dim)' } }, `~${Math.floor(estMin / 60)}H ${estMin % 60}M`),
      ),
      el('button', {
        class: 'btn primary full lg',
        onClick: () => setState({ newJobStep: 2 }),
      }, 'NEXT →'),
    ));
  }

  return wrap;
}

function renderStep2() {
  const wrap = el('div', { class: 'mt-24' });
  wrap.appendChild(el('div', { class: 'section-label' }, 'CUSTOMER (OPTIONAL)'));

  const nameInput = el('input', { type: 'text', placeholder: 'Name', value: state.newJobData.customerName });
  nameInput.addEventListener('input', (e) => { state.newJobData.customerName = e.target.value; });
  wrap.appendChild(nameInput);

  const phoneInput = el('input', { type: 'tel', placeholder: 'Phone', value: state.newJobData.customerPhone });
  phoneInput.addEventListener('input', (e) => { state.newJobData.customerPhone = e.target.value; });
  wrap.appendChild(phoneInput);

  const carInput = el('input', { type: 'text', placeholder: 'Car (e.g. Honda Civic)', value: state.newJobData.carInfo });
  carInput.addEventListener('input', (e) => { state.newJobData.carInfo = e.target.value; });
  wrap.appendChild(carInput);

  const total = [state.newJobData.package, ...state.newJobData.addons].reduce((s, k) => s + ALL[k].price, 0);
  const estMin = [state.newJobData.package, ...state.newJobData.addons].reduce((s, k) => s + ALL[k].estMinutes, 0);

  const confirm = el('div', { class: 'card mt-32', style: { padding: '20px' } });
  confirm.appendChild(el('div', { class: 'label' }, 'CONFIRM'));
  confirm.appendChild(el('div', { class: 'serif', style: { fontSize: '32px', fontWeight: '500', marginTop: '4px' } }, `$${total}`));
  confirm.appendChild(el('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--text-dim)', marginTop: '4px', letterSpacing: '1px' } }, `~${Math.floor(estMin / 60)}H ${estMin % 60}M ESTIMATED`));
  confirm.appendChild(el('div', { style: { marginTop: '12px', paddingTop: '12px', borderTop: '1px solid var(--border)', fontSize: '12px', color: 'var(--text-dim)' } },
    ALL[state.newJobData.package].label,
    ...state.newJobData.addons.map((a) => el('div', { style: { fontSize: '11px', color: 'var(--text-mute)', marginTop: '2px' } }, `+ ${ALL[a].label}`)),
  ));
  wrap.appendChild(confirm);

  wrap.appendChild(el('div', { class: 'row mt-20', style: { gap: '8px' } },
    el('button', {
      class: 'btn',
      style: { flex: 1, padding: '16px' },
      onClick: () => setState({ newJobStep: 1 }),
    }, '← BACK'),
    el('button', {
      class: 'btn primary',
      style: { flex: 2, padding: '16px' },
      onClick: createAndStartJob,
    }, 'START JOB →'),
  ));

  return wrap;
}

function createAndStartJob() {
  const services = [state.newJobData.package, ...state.newJobData.addons];
  const total = services.reduce((s, k) => s + ALL[k].price, 0);
  const job = {
    id: `job-${Date.now()}`,
    package: state.newJobData.package,
    addons: state.newJobData.addons,
    customerName: state.newJobData.customerName,
    customerPhone: state.newJobData.customerPhone,
    carInfo: state.newJobData.carInfo,
    total,
    createdAt: Date.now(),
    durationSecs: 0,
    checked: buildChecked(services),
    photos: [],
    completed: false,
  };
  state.data.jobs.unshift(job);
  state.showNewJob = false;
  openActiveJob(job);
}

// ════════════════════════════════════════════════════════════════════
// ACTIVE JOB
// ════════════════════════════════════════════════════════════════════
let jobTimerInterval = null;
function startJobTimer() {
  clearInterval(jobTimerInterval);
  if (!state.activeJob || !state.activeJob._running) return;
  jobTimerInterval = setInterval(() => {
    if (!state.activeJob) { clearInterval(jobTimerInterval); return; }
    state.activeJob._timerSecs += 1;
    // Save back to job record
    const j = state.data.jobs.find((x) => x.id === state.activeJob.id);
    if (j) j.durationSecs = state.activeJob._timerSecs;
    // Update timer display only (avoid full re-render)
    const timerEl = document.getElementById('job-timer');
    if (timerEl) timerEl.textContent = fmtTime(state.activeJob._timerSecs);
    // Persist every 10s
    if (state.activeJob._timerSecs % 10 === 0) save();
  }, 1000);
}

function renderActiveJob(root) {
  const job = state.activeJob;
  const services = [job.package, ...job.addons];
  const svc = ALL[job._activeService];
  const section = svc.sections.find((s) => s.id === job._activeSection);
  const totalItems = Object.keys(job.checked).length;
  const done = Object.values(job.checked).filter(Boolean).length;
  const progress = totalItems > 0 ? (done / totalItems) * 100 : 0;

  const top = el('div', { class: 'card', style: { padding: '16px 20px 0', borderRadius: 0, borderLeft: 'none', borderRight: 'none', borderTop: 'none' } });
  top.appendChild(el('div', { class: 'row', style: { alignItems: 'flex-start' } },
    el('div', {},
      el('button', {
        style: { background: 'none', border: 'none', color: 'var(--text-mute)', fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '2px', cursor: 'pointer', padding: 0, marginBottom: '6px' },
        onClick: () => {
          clearInterval(jobTimerInterval);
          // Save current state to job
          const j = state.data.jobs.find((x) => x.id === job.id);
          if (j) {
            j.durationSecs = job._timerSecs;
            j.checked = job.checked;
            j.photos = job.photos;
          }
          state.activeJob = null;
          render();
        },
      }, '← PAUSE & SAVE'),
      el('div', { class: 'h2' }, job.customerName || 'Job'),
      el('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--text-dim)', letterSpacing: '1px', marginTop: '2px' } }, `${done}/${totalItems} TASKS · $${job.total}`),
    ),
    el('div', { style: { textAlign: 'right' } },
      el('div', {
        id: 'job-timer',
        class: 'mono',
        style: {
          fontSize: '26px', fontWeight: '500', letterSpacing: '1px',
          color: progress === 100 ? 'var(--green)' : 'var(--text)',
          fontVariantNumeric: 'tabular-nums',
        },
      }, fmtTime(job._timerSecs)),
      el('button', {
        style: { background: 'none', border: 'none', color: 'var(--text-dim)', fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '2px', cursor: 'pointer', padding: '2px 0' },
        onClick: () => {
          job._running = !job._running;
          if (job._running) startJobTimer();
          else clearInterval(jobTimerInterval);
          render();
        },
      }, job._running ? '⏸ PAUSE' : '▶ RESUME'),
    ),
  ));

  // Progress bar
  const pb = el('div', { class: 'progress', style: { marginTop: '12px' } });
  pb.appendChild(el('div', { class: 'progress-fill', style: { width: progress + '%', background: progress === 100 ? 'var(--green)' : 'var(--accent)' } }));
  top.appendChild(pb);

  // Service tabs
  const svcTabs = el('div', { class: 'svc-tabs', style: { marginTop: '8px' } });
  services.forEach((sk) => {
    const s = ALL[sk];
    const keys = s.sections.flatMap((sec) => sec.items.map((_, i) => `${sec.id}-${i}`));
    const sDone = keys.filter((k) => job.checked[k]).length;
    const isActive = job._activeService === sk;
    const isDone = sDone === keys.length;
    svcTabs.appendChild(el('button', {
      class: 'svc-tab' + (isActive ? ' active' : ''),
      onClick: () => {
        job._activeService = sk;
        job._activeSection = s.sections[0].id;
        render();
      },
    }, `${isDone ? '✓ ' : ''}${s.label.toUpperCase()} `, el('span', { style: { opacity: 0.5 } }, `${sDone}/${keys.length}`)));
  });
  top.appendChild(svcTabs);

  // Section tabs
  const secTabs = el('div', { class: 'svc-tabs', style: { borderTop: '1px solid var(--border)', paddingTop: '4px' } });
  svc.sections.forEach((sec) => {
    const keys = sec.items.map((_, i) => `${sec.id}-${i}`);
    const sDone = keys.filter((k) => job.checked[k]).length;
    const isActive = job._activeSection === sec.id;
    const isDone = sDone === keys.length;
    secTabs.appendChild(el('button', {
      style: {
        background: 'none', border: 'none',
        borderBottom: isActive ? '1px solid var(--text-dim)' : '1px solid transparent',
        color: isActive ? 'var(--text)' : (isDone ? 'var(--text-mute)' : 'var(--text-dim)'),
        padding: '6px 10px', fontFamily: 'var(--mono)', fontSize: '8px', letterSpacing: '1px',
        cursor: 'pointer', whiteSpace: 'nowrap',
      },
      onClick: () => { job._activeSection = sec.id; render(); },
    }, `${isDone ? '✓ ' : ''}${sec.label.toUpperCase()} ${sDone}/${keys.length}`));
  });
  top.appendChild(secTabs);

  root.appendChild(top);

  // Items
  const itemsWrap = el('div', { style: { padding: '12px 20px 100px' } });
  section.items.forEach((item, i) => {
    const k = `${section.id}-${i}`;
    const c = job.checked[k];
    const warn = item.startsWith('⚠️') || item.startsWith('CHECK');
    itemsWrap.appendChild(el('div', {
      class: 'item-row' + (c ? ' done' : ''),
      onClick: () => {
        job.checked[k] = !job.checked[k];
        // Update the job in state
        const j = state.data.jobs.find((x) => x.id === job.id);
        if (j) j.checked = job.checked;
        save();
        render();
      },
    },
      el('div', { class: 'check' + (c ? ' checked' : '') + (warn ? ' warn' : '') }, c ? '✓' : ''),
      el('span', { class: 'item-text' + (warn ? ' warn' : '') }, item),
    ));
  });

  // Photos
  const photoWrap = el('div', { class: 'mt-32' });
  photoWrap.appendChild(el('div', { class: 'section-label' }, 'PHOTOS'));
  const photoGrid = el('div', { class: 'photo-grid' });
  (job.photos || []).forEach((p) => {
    const w = el('div', { class: 'photo-wrap' });
    w.appendChild(el('img', { class: 'photo', src: p.data }));
    w.appendChild(el('button', {
      class: 'photo-x',
      onClick: () => {
        job.photos = job.photos.filter((x) => x.id !== p.id);
        const j = state.data.jobs.find((x) => x.id === job.id);
        if (j) j.photos = job.photos;
        save();
        render();
      },
    }, '×'));
    photoGrid.appendChild(w);
  });
  const addBtn = el('button', { class: 'photo-add' }, '+');
  const fileInput = el('input', { type: 'file', accept: 'image/*', capture: 'environment', style: { display: 'none' } });
  fileInput.addEventListener('change', (e) => handlePhoto(e, job));
  addBtn.addEventListener('click', () => fileInput.click());
  photoGrid.appendChild(addBtn);
  photoGrid.appendChild(fileInput);
  photoWrap.appendChild(photoGrid);
  itemsWrap.appendChild(photoWrap);

  root.appendChild(itemsWrap);

  // Bottom action
  const finish = () => {
    clearInterval(jobTimerInterval);
    const j = state.data.jobs.find((x) => x.id === job.id);
    if (j) {
      j.durationSecs = job._timerSecs;
      j.checked = job.checked;
      j.photos = job.photos;
      j.completed = true;
      j.completedAt = Date.now();
    }
    state.activeJob = null;
    save();
    render();
  };

  if (progress === 100) {
    root.appendChild(el('div', { class: 'bottom-action' },
      el('button', {
        class: 'btn full lg',
        style: { background: 'var(--green)', borderColor: 'var(--green)', color: '#fff', fontWeight: 600 },
        onClick: finish,
      }, `COMPLETE · $${job.total} · ${fmtTime(job._timerSecs)}`),
    ));
  } else {
    root.appendChild(el('div', { class: 'bottom-action' },
      el('button', { class: 'btn full', style: { padding: '14px' }, onClick: finish },
        `FINISH EARLY (${done}/${totalItems})`),
    ));
  }
}

function handlePhoto(e, job) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const max = 800;
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const w = img.width * scale, h = img.height * scale;
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      job.photos = job.photos || [];
      job.photos.push({ id: `p${Date.now()}`, data: compressed, ts: Date.now() });
      const j = state.data.jobs.find((x) => x.id === job.id);
      if (j) j.photos = job.photos;
      save();
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

let map = null;
let radiusCircle = null;
let homeMarker = null;
let streetLayers = {};

    el('div', { class: 'rstat' }, el('div', { class: 'rstat-label' }, 'DONE'), el('div', { class: 'rstat-val', style: { color: 'var(--green)' } }, sDone)),

function initMap() {
  const container = document.getElementById('routes-map');
  if (!container || container._mapInited) return;
  container._mapInited = true;

  map = L.map('routes-map', { zoomControl: false }).setView([39.5, -98.35], 4);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap'
  }).addTo(map);

  const r = state.data.route;
  if (r.home) {
    map.setView([r.home.lat, r.home.lng], 15);
    placeHomeMarker(r.home.lat, r.home.lng);
    updateRadiusCircle();
    r.streets.forEach(drawStreet);
    r.pins.forEach(drawPin);
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => map.setView([pos.coords.latitude, pos.coords.longitude], 15),
      () => {}, { timeout: 5000 }
    );
  }

  map.on('click', (e) => {
    const m = state.routeMode;
    if (m === 'home') {
      state.data.route.home = { lat: e.latlng.lat, lng: e.latlng.lng };
      placeHomeMarker(e.latlng.lat, e.latlng.lng);
      updateRadiusCircle();
      save();
    } else if (m === 'customer') {
      addPin(e.latlng.lat, e.latlng.lng, 'customer');
    } else if (m === 'followup') {
      addPin(e.latlng.lat, e.latlng.lng, 'followup');
    }
  });
}

function placeHomeMarker(lat, lng) {
  if (homeMarker) map.removeLayer(homeMarker);
  homeMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '', html: '<div class="pin-dot pin-home"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9],
    }),
  }).addTo(map);
}

function updateRadiusCircle() {
  if (!map) return;
  const r = state.data.route;
  if (!r.home) return;
  if (radiusCircle) map.removeLayer(radiusCircle);
  radiusCircle = L.circle([r.home.lat, r.home.lng], {
    radius: r.radius * 1609.34,
    color: 'var(--accent)', weight: 1, fillColor: 'var(--accent)', fillOpacity: 0.04, dashArray: '4,4',
  }).addTo(map);
}

const OVERPASS_SERVERS = [
  "https://overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter",
  "https://overpass.osm.ch/api/interpreter",
];

async function loadStreets() {
  const r = state.data.route;
  if (!r.home) { toast('Set HOME first by tapping the map'); return; }
  toast('Loading streets...', 0);

  const meters = r.radius * 1609.34;
  const query = `[out:json][timeout:25];
(way["highway"~"^(residential|tertiary|secondary|unclassified|living_street|primary)$"](around:${meters},${r.home.lat},${r.home.lng}););
out geom;`;

  let data = null, lastErr = null;
  for (const server of OVERPASS_SERVERS) {
    try {
      const res = await fetch(server, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: query });
      if (!res.ok) { lastErr = `HTTP ${res.status}`; continue; }
      data = await res.json();
      break;
    } catch (e) { lastErr = e.message || 'network error'; }
  }

  hideToast();
  if (!data) { toast(`Failed: ${lastErr}`, 3500); return; }

  Object.values(streetLayers).forEach((l) => map.removeLayer(l));
  streetLayers = {};
  state.data.route.streets = [];

  data.elements.forEach((el) => {
    if (!el.geometry) return;
    const coords = el.geometry.map((p) => [p.lat, p.lon]);
    const midIdx = Math.floor(coords.length / 2);
    const street = {
      id: el.id, status: 'open', coords, midpoint: coords[midIdx],
      name: el.tags?.name || 'Unnamed',
    };
    state.data.route.streets.push(street);
    drawStreet(street);
  });

  save();
  render();
  toast(`Loaded ${state.data.route.streets.length} streets`);
}

function streetStyle(s) {
  const m = { open: '#888', done: 'var(--text-mute)', skip: 'var(--red)', next: 'var(--accent)' };
  return {
    color: m[s.status] || '#888',
    weight: s.status === 'next' ? 6 : 4,
    opacity: s.status === 'done' ? 0.4 : 0.9,
    lineCap: 'round',
  };
}

function drawStreet(s) {
  if (streetLayers[s.id]) map.removeLayer(streetLayers[s.id]);
  const line = L.polyline(s.coords, streetStyle(s)).addTo(map);
  line.on('click', () => {
    const m = state.routeMode;
    if (m !== 'done' && m !== 'skip') {
      toast('Switch to DONE or SKIP mode');
      return;
    }
    s.status = s.status === m ? 'open' : m;
    drawStreet(s);
    save();
    // Re-render stats only
    const r = state.data.route;
    const total = r.streets.length;
    const sDone = r.streets.filter((x) => x.status === 'done').length;
    const sSkip = r.streets.filter((x) => x.status === 'skip').length;
    const stats = document.querySelectorAll('.rstat-val');
    if (stats.length === 4) {
      stats[0].textContent = total;
      stats[1].textContent = sDone;
      stats[2].textContent = sSkip;
      stats[3].textContent = total - sDone - sSkip;
    }
  });
  streetLayers[s.id] = line;
}

function addPin(lat, lng, type) {
  const id = `pin-${Date.now()}`;
  const pin = { id, type, lat, lng };
  state.data.route.pins.push(pin);
  drawPin(pin);
  save();
}

function drawPin(pin) {
  const cls = pin.type === 'customer' ? 'pin-customer' : 'pin-followup';
  const marker = L.marker([pin.lat, pin.lng], {
    icon: L.divIcon({
      className: '', html: `<div class="pin-dot ${cls}"></div>`,
      iconSize: [14, 14], iconAnchor: [7, 7],
    }),
  }).addTo(map);
  marker.on('click', () => {
    if (confirm('Remove this pin?')) {
      map.removeLayer(marker);
      state.data.route.pins = state.data.route.pins.filter((p) => p.id !== pin.id);
      save();
    }
  });
  pinMarkers[pin.id] = marker;
}

function findNextStreet() {
  const r = state.data.route;
  if (!r.home) { toast('Set HOME first'); return; }
  const open = r.streets.filter((s) => s.status === 'open' || s.status === 'next');
  if (open.length === 0) { toast('All streets done. Nice work.'); return; }

  r.streets.forEach((s) => {
    if (s.status === 'next') { s.status = 'open'; drawStreet(s); }
  });

  let nearest = null, minD = Infinity;
  open.forEach((s) => {
    const d = Math.hypot(r.home.lat - s.midpoint[0], r.home.lng - s.midpoint[1]);
    if (d < minD) { minD = d; nearest = s; }
  });
  if (nearest) {
    nearest.status = 'next';
    drawStreet(nearest);
    map.flyTo(nearest.midpoint, 17, { duration: 1 });
    toast(`Next: ${nearest.name}`, 2500);
    save();
  }
}

function resetRouteProgress() {
  if (!confirm('Reset street progress? Home and pins stay.')) return;
  state.data.route.streets.forEach((s) => { s.status = 'open'; drawStreet(s); });
  save();
  render();
}

    },
      el('button', {
        class: 'check' + (s.lowStock ? '' : ''),
        style: {
          border: `1px solid ${s.lowStock ? 'var(--red)' : 'var(--border-hi)'}`,
          background: s.lowStock ? 'var(--red)' : 'none',
          color: '#fff',
        },
        onClick: () => {
          s.lowStock = !s.lowStock;
          save(); render();
        },
      }, s.lowStock ? '!' : ''),
      el('div', { style: { flex: 1, fontSize: '13px', color: s.lowStock ? 'var(--red)' : 'var(--text)' } }, s.name),
      el('button', {
        style: { background: 'none', border: 'none', color: 'var(--text-mute)', fontSize: '18px', cursor: 'pointer', padding: '4px 8px' },
        onClick: () => {
          state.data.supplies = state.data.supplies.filter((x) => x.id !== s.id);
          save(); render();
        },
      }, '×'),
    ));
  });

  // Reset all
  page.appendChild(el('div', { class: 'section-label mt-32' }, 'DANGER'));
  page.appendChild(el('button', {
    class: 'btn full',
    style: { borderColor: 'var(--red)', color: 'var(--red)' },
    onClick: async () => {
      if (!confirm('Delete ALL data? This cannot be undone.')) return;
      try { await window.storage.delete(STORAGE_KEY); } catch (e) {}
      state = defaultState();
      render();
    },
  }, 'RESET EVERYTHING'),
  );

  root.appendChild(page);
}

// ════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════
(async () => {
  await load();
  render();
})();
</script>
</body>
</html>
