<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0c0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Detail Co.</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --surface-hi: #1a1a1a;
    --border: #222;
    --border-hi: #2a2a2a;
    --text: #e8e6e3;
    --text-dim: #888581;
    --text-mute: #4a4744;
    --accent: #d97706;
    --accent-text: #000;
    --green: #15803d;
    --red: #b91c1c;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
    --map-filter: invert(1) hue-rotate(200deg) brightness(0.95) contrast(0.85);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; }
  body { padding-bottom: env(safe-area-inset-bottom); }
  button, input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }

  #app { padding-bottom: 78px; min-height: 100vh; position: relative; z-index: 1; }

  .mono { font-family: var(--mono); }
  .serif { font-family: var(--serif); }
  .label { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; color: var(--text-mute); }
  .h1 { font-family: var(--serif); font-size: 28px; font-weight: 500; letter-spacing: -0.5px; }
  .h2 { font-family: var(--serif); font-size: 20px; font-weight: 500; }
  .accent { color: var(--accent); }

  .page { padding: 32px 20px 20px; }
  .section-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 3px; color: var(--text-mute);
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  .card { background: var(--surface); border: 1px solid var(--border); padding: 16px; }
  .card.hi { background: var(--surface-hi); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 12px 16px; cursor: pointer; font-family: var(--mono);
    font-size: 10px; letter-spacing: 2px; transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); font-weight: 600; }
  .btn.full { width: 100%; }
  .btn.lg { padding: 16px; font-size: 11px; letter-spacing: 3px; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  input[type="text"], input[type="tel"], input[type="number"], input[type="search"], textarea {
    width: 100%; padding: 14px 16px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s;
    border-radius: 0;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-mute); }
  textarea { resize: vertical; min-height: 70px; font-family: inherit; }

  #tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    display: flex; padding: 6px 0 14px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .tab {
    flex: 1; background: none; border: none; padding: 10px 6px; cursor: pointer;
    color: var(--text-mute); font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px;
    position: relative;
  }
  .tab.active { color: var(--text); }
  .tab .underline {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 0; height: 2px; background: var(--accent); transition: width 0.2s;
  }
  .tab.active .underline { width: 20px; }

  .bottom-action {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg); border-top: 1px solid var(--border); padding: 12px 20px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }

  .job-card {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    padding: 14px 16px; margin-bottom: 8px; cursor: pointer; text-align: left;
    display: flex; justify-content: space-between; align-items: center;
    position: relative;
  }
  .job-card .name { font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job-card .meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  .job-card .price { font-family: var(--serif); font-size: 18px; font-weight: 500; }
  .job-card .duration { font-family: var(--mono); font-size: 9px; color: var(--text-mute); letter-spacing: 1px; margin-top: 2px; text-align: right; }
  .unpaid-dot {
    position: absolute; top: 6px; right: 6px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  }

  .goal-card { padding: 20px; }
  .goal-card .amount { font-family: var(--serif); font-size: 42px; line-height: 1; font-weight: 500; letter-spacing: -1px; }
  .goal-card .of { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .progress { height: 2px; background: var(--surface-hi); margin-top: 14px; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }

  .check {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1px solid var(--border-hi); background: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--accent-text); border-radius: 2px;
  }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.warn { border-color: var(--red); }

  .svc-tabs { display: flex; overflow-x: auto; }
  .svc-tab {
    background: none; border: none; padding: 10px 12px;
    color: var(--text-dim); font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
    cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent;
  }
  .svc-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .item-row {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: opacity 0.2s;
  }
  .item-row.done { opacity: 0.35; }
  .item-row.done .item-text { text-decoration: line-through; }
  .item-text { font-size: 14px; line-height: 1.4; }
  .item-text.warn { color: var(--red); }

  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .theme-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 14px; cursor: pointer; text-align: left; min-height: 100px;
    position: relative;
  }
  .theme-card.active { border-color: var(--accent); }
  .theme-card .check-dot {
    position: absolute; top: 10px; right: 10px;
    width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--border-hi);
  }
  .theme-card.active .check-dot { background: var(--accent); border-color: var(--accent); }
  .theme-name { font-family: var(--serif); font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .theme-desc { font-family: var(--mono); font-size: 9px; color: var(--text-mute); letter-spacing: 1px; }
  .theme-swatches { display: flex; gap: 4px; margin-top: 10px; }
  .swatch { width: 14px; height: 14px; border: 1px solid rgba(255,255,255,0.1); }

  /* MAP - LIVES OUTSIDE THE APP RE-RENDER CYCLE */
  #map-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 78px;
    z-index: 0;
    background: var(--bg);
    display: none;
  }
  #map-container.visible { display: block; }
  body.routes-view #app {
    background: transparent;
    pointer-events: none;
  }
  body.routes-view #app > * {
    pointer-events: auto;
  }
  #map-leaflet { width: 100%; height: 100%; }
  .leaflet-tile-pane { filter: var(--map-filter); }
  .leaflet-control-attribution {
    background: rgba(0,0,0,0.6) !important; color: var(--text-mute) !important; font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important; color: var(--text) !important;
    border: 1px solid var(--border) !important;
  }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
  .pin-home { background: var(--accent); width: 18px; height: 18px; }
  .pin-customer { background: var(--green); }
  .pin-followup { background: var(--accent); }
  .pin-me {
    width: 18px; height: 18px; background: #22d3ee; border: 3px solid #fff;
    border-radius: 50%; box-shadow: 0 0 0 6px rgba(34, 211, 238, 0.2);
  }

  #route-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    background: linear-gradient(180deg, rgba(12,12,12,0.95), rgba(12,12,12,0.3));
    padding: 14px 16px 18px; pointer-events: none;
  }
  #route-top > * { pointer-events: auto; }
  #route-modes { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
  .route-mode {
    flex: 1; min-width: 56px; padding: 8px 4px;
    background: rgba(20,20,20,0.85); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
    cursor: pointer; text-align: center;
  }
  .route-mode.active { color: var(--text); border-color: var(--accent); background: var(--surface-hi); }

  #route-bottom {
    position: fixed; bottom: 78px; left: 0; right: 0; z-index: 500;
    background: rgba(12,12,12,0.95); border-top: 1px solid var(--border);
    padding: 12px 16px;
  }
  #route-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
  .rstat { background: var(--surface); border: 1px solid var(--border); padding: 8px 4px; text-align: center; }
  .rstat-label { font-family: var(--mono); font-size: 7px; letter-spacing: 1.5px; color: var(--text-mute); }
  .rstat-val { font-family: var(--serif); font-size: 16px; font-weight: 500; margin-top: 2px; }

  #locate-btn {
    position: fixed; top: 50%; right: 12px; transform: translateY(-50%);
    z-index: 600; width: 42px; height: 42px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 16px; cursor: pointer; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  input[type="range"] {
    width: 100%; -webkit-appearance: none; background: transparent; height: 20px;
  }
  input[type="range"]::-webkit-slider-runnable-track { height: 2px; background: var(--border-hi); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    background: var(--accent); border-radius: 50%; margin-top: -7px; cursor: pointer;
  }
  input[type="range"]::-moz-range-track { height: 2px; background: var(--border-hi); }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; background: var(--accent); border-radius: 50%; border: none;
  }

  #toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(12,12,12,0.97); border: 1px solid var(--accent);
    padding: 14px 22px; z-index: 9999; font-family: var(--mono); font-size: 11px;
    letter-spacing: 2px; max-width: 80%; text-align: center; display: none;
  }
  #toast.show { display: block; }
  .spinner {
    display: inline-block; width: 8px; height: 8px;
    background: var(--accent); border-radius: 50%; margin-left: 8px;
    animation: pulse 0.9s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.2; transform: scale(0.7); } }

  .empty {
    margin-top: 60px; padding: 40px; text-align: center;
    font-family: var(--serif); font-style: italic; color: var(--text-mute); font-size: 16px;
  }
  .empty-sub { font-size: 12px; font-family: var(--mono); font-style: normal; letter-spacing: 1px; display: block; margin-top: 6px; }

  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .photo { width: 100%; aspect-ratio: 1; object-fit: cover; border: 1px solid var(--border); }
  .photo-add {
    aspect-ratio: 1; background: var(--surface); border: 1px dashed var(--border-hi);
    color: var(--text-mute); font-size: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-wrap { position: relative; }
  .photo-x {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.7); border: none; color: var(--text); font-size: 11px; cursor: pointer;
  }

  .pill {
    display: inline-block; padding: 3px 8px; font-family: var(--mono); font-size: 9px;
    letter-spacing: 1px; border: 1px solid var(--border); border-radius: 999px;
    color: var(--text-dim);
  }
  .pill.paid { color: var(--green); border-color: var(--green); }
  .pill.unpaid { color: var(--red); border-color: var(--red); }

  .row { display: flex; justify-content: space-between; align-items: center; }
  .gap-8 { gap: 8px; }
  .mt-12 { margin-top: 12px; }
  .mt-20 { margin-top: 20px; }
  .mt-24 { margin-top: 24px; }
  .mt-32 { margin-top: 32px; }

  /* Tip modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--bg); border: 1px solid var(--border); padding: 24px;
    width: 100%; max-width: 360px;
  }
</style>
</head>
<body>

<!-- Map lives OUTSIDE #app so it doesn't get destroyed on re-render -->
<div id="map-container">
  <div id="map-leaflet"></div>
</div>

<div id="app"></div>
<nav id="tabs"></nav>
<div id="toast"></div>

<script>

};

function applyTheme(name) {
  const theme = THEMES[name] || THEMES.industrial;
  Object.entries(theme.vars).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
  document.querySelector('meta[name="theme-color"]').setAttribute('content', theme.vars['--bg']);
}

// ════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════
const STORAGE_KEY = "detail-co-v35";

function defaultState() {
  return {
    theme: "industrial",
    view: "jobs",
    activeJob: null,
    showNewJob: false,
    newJobStep: 1,
    newJobData: { package: null, addons: [], customerName: "", customerPhone: "", carInfo: "", notes: "" },
    jobSearch: "",
    showCompleteModal: false,
    data: {
      jobs: [],
      supplies: DEFAULT_SUPPLIES.map((name, i) => ({ id: `s${i}`, name, lowStock: false })),
      goal: 5500,
      goalName: "Sur-Ron Ultra Bee",
      route: { home: null, radius: 0.5, streets: [], pins: [] },
    },
    quote: { package: null, addons: [] },
    routeMode: "home",
  };
}

let state = defaultState();
let saveTimer = null;

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const persist = { theme: state.theme, data: state.data };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(persist)); } catch (e) { console.warn('save failed', e); }
  }, 300);
}

async function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.theme) state.theme = saved.theme;
      if (saved.data) state.data = { ...state.data, ...saved.data };
    }
  } catch (e) { console.warn('load failed', e); }
}

function setState(updater) {
  if (typeof updater === 'function') updater(state);
  else Object.assign(state, updater);
  save();
  render();
}

// ════════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════════
function fmtTime(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function fmtDur(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function buildChecked(services) {
  const c = {};
  services.forEach((k) => {
    ALL[k].sections.forEach((sec) => sec.items.forEach((_, i) => { c[`${sec.id}-${i}`] = false; }));
  });
  return c;
}
function h(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') node.className = v;
    else if (k === 'style') Object.assign(node.style, v);
    else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') node.innerHTML = v;
    else if (v != null) node.setAttribute(k, v);
  });
  children.flat().forEach((c) => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

let toastTimer = null;
function toast(msg, ms = 1800, loading = false) {
  const t = document.getElementById('toast');
  t.textContent = '';
  t.appendChild(document.createTextNode(msg));
  if (loading) t.appendChild(h('span', { class: 'spinner' }));
  t.classList.add('show');
  clearTimeout(toastTimer);
  if (ms > 0) toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}
function hideToast() {
  clearTimeout(toastTimer);
  document.getElementById('toast').classList.remove('show');
}

// ════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════
function render() {
  applyTheme(state.theme);
  const mapContainer = document.getElementById('map-container');
  const app = document.getElementById('app');
  const tabs = document.getElementById('tabs');

  // Show/hide map based on view (don't destroy it)
  const showMap = state.view === 'routes' && !state.activeJob && !state.showNewJob;
  mapContainer.classList.toggle('visible', showMap);
  document.body.classList.toggle('routes-view', showMap);

  app.innerHTML = '';

  if (state.activeJob) {
    renderActiveJob(app);
    tabs.style.display = 'none';
    if (state.showCompleteModal) renderCompleteModal(app);
    return;
  }
  if (state.showNewJob) { renderNewJob(app); tabs.style.display = 'none'; return; }

  tabs.style.display = 'flex';

  if (state.view === 'jobs') renderJobs(app);
  else if (state.view === 'quote') renderQuote(app);
  else if (state.view === 'routes') renderRoutes(app);
  else if (state.view === 'more') renderMore(app);

  renderTabs();

  if (state.showCompleteModal) renderCompleteModal(app);
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const items = [
    { id: 'jobs', label: 'JOBS' },
    { id: 'routes', label: 'ROUTES' },
    { id: 'quote', label: 'QUOTE' },
    { id: 'more', label: 'MORE' },
  ];
  tabs.innerHTML = '';
  items.forEach((t) => {
    const active = state.view === t.id;
    tabs.appendChild(h('button', {
      class: 'tab' + (active ? ' active' : ''),
      onClick: () => setState({ view: t.id }),
    }, h('span', { class: 'underline' }), t.label));
  });
}

// ════════════════════════════════════════════════════════════════════
// JOBS VIEW
// ════════════════════════════════════════════════════════════════════
function renderJobs(root) {
  const completed = state.data.jobs.filter((j) => j.completed);
  const paid = completed.filter((j) => j.paid !== false);
  const totalEarned = paid.reduce((s, j) => s + j.total + (j.tip || 0), 0);
  const inProgress = state.data.jobs.filter((j) => !j.completed);
  let recent = completed.slice();

  // Filter by search
  if (state.jobSearch) {
    const q = state.jobSearch.toLowerCase();
    recent = recent.filter((j) =>
      (j.customerName || '').toLowerCase().includes(q) ||
      (j.carInfo || '').toLowerCase().includes(q) ||
      (j.notes || '').toLowerCase().includes(q)
    );
  } else {
    recent = recent.slice(0, 8);
  }

  const unpaidCount = completed.filter((j) => j.paid === false).length;
  const pct = Math.min(100, (totalEarned / state.data.goal) * 100);

  const page = h('div', { class: 'page' });
  page.appendChild(h('div', { class: 'label' }, 'DETAIL CO.'));
  page.appendChild(h('div', { class: 'h1' }, 'Today', h('span', { class: 'accent' }, '.')));

  // Goal card
  const goal = h('div', { class: 'card goal-card mt-24' });
  goal.appendChild(h('div', { class: 'label' }, 'EARNED (PAID)'));
  goal.appendChild(h('div', { class: 'row', style: { alignItems: 'baseline', gap: '8px', marginTop: '6px' } },
    h('div', { class: 'amount' }, `$${totalEarned}`),
    h('div', { class: 'of' }, ` / $${state.data.goal}`),
  ));
  const prog = h('div', { class: 'progress' });
  prog.appendChild(h('div', { class: 'progress-fill', style: { width: pct + '%' } }));
  goal.appendChild(prog);
  goal.appendChild(h('div', { class: 'row mono', style: { marginTop: '8px', fontSize: '11px', color: 'var(--text-dim)' } },
    h('span', {}, state.data.goalName),
    h('span', {}, Math.round(pct) + '%'),
  ));
  if (unpaidCount > 0) {
    goal.appendChild(h('div', { class: 'mono', style: { marginTop: '8px', fontSize: '10px', color: 'var(--red)', letterSpacing: '1px' } },
      `${unpaidCount} UNPAID JOB${unpaidCount === 1 ? '' : 'S'}`));
  }
  page.appendChild(goal);

  page.appendChild(h('button', {
    class: 'btn primary full lg mt-20',
    onClick: () => setState({ showNewJob: true, newJobStep: 1, newJobData: { package: null, addons: [], customerName: '', customerPhone: '', carInfo: '', notes: '' } }),
  }, h('span', {}, 'START NEW JOB'),
     h('span', { style: { marginLeft: 'auto', fontSize: '18px' } }, '→')));

  if (inProgress.length > 0) {
    page.appendChild(h('div', { class: 'mt-32' },
      h('div', { class: 'section-label' }, 'IN PROGRESS'),
      ...inProgress.map((j) => jobCard(j, false))));
  }

  // Search
  if (completed.length >= 3) {
    const search = h('input', { type: 'search', placeholder: 'Search jobs...', value: state.jobSearch, style: { marginTop: '24px' } });
    search.addEventListener('input', (e) => { state.jobSearch = e.target.value; render(); });
    page.appendChild(search);
  }

  if (recent.length > 0) {
    page.appendChild(h('div', { class: 'mt-12' },
      h('div', { class: 'section-label' }, state.jobSearch ? 'RESULTS' : 'RECENT JOBS'),
      ...recent.map((j) => jobCard(j, true))));
  }

  if (state.data.jobs.length === 0) {
    page.appendChild(h('div', { class: 'empty' },
      'No jobs yet.',
      h('span', { class: 'empty-sub' }, 'Tap above to detail your first car.')));
  }

  root.appendChild(page);
}

function jobCard(job, done) {
  const pkg = ALL[job.package];
  const isUnpaid = done && job.paid === false;
  const pillCls = job.paid === false ? 'pill unpaid' : (done ? 'pill paid' : 'pill');
  const pillText = job.paid === false ? 'UNPAID' : (done ? 'PAID' : 'IN PROGRESS');
  return h('button', { class: 'job-card', onClick: () => openActiveJob(job) },
    isUnpaid ? h('span', { class: 'unpaid-dot' }) : null,
    h('div', { style: { flex: '1', minWidth: '0' } },
      h('div', { class: 'name' }, job.customerName || 'Unnamed',
        job.carInfo ? h('span', { style: { color: 'var(--text-dim)', fontSize: '12px' } }, ` · ${job.carInfo}`) : null),
      h('div', { class: 'meta' },
        `${pkg.label.toUpperCase()}${job.addons.length > 0 ? ' +' + job.addons.length : ''} · ${fmtDate(job.createdAt)}`),
      done ? h('div', { style: { marginTop: '6px' } }, h('span', { class: pillCls }, pillText)) : null,
    ),
    h('div', { style: { textAlign: 'right', marginLeft: '12px' } },
      h('div', { class: 'price', style: { color: done ? 'var(--green)' : 'var(--accent)' } }, `$${job.total + (job.tip || 0)}`),
      h('div', { class: 'duration' }, done ? fmtDur(job.durationSecs) : 'IN PROGRESS'),
    ),
  );
}

function openActiveJob(job) {
  state.activeJob = { ...job, _timerSecs: job.durationSecs || 0, _running: !job.completed };
  state.activeJob._activeService = job.package;
  state.activeJob._activeSection = ALL[job.package].sections[0].id;
  render();
  if (state.activeJob._running) startJobTimer();
}

function renderNewJob(root) {

    style: { background: 'none', border: 'none', color: 'var(--text-mute)', padding: '0', marginBottom: '20px', fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '2px', cursor: 'pointer' },
    onClick: () => setState({ showNewJob: false }),
  }, '← CANCEL'));

  page.appendChild(h('div', { class: 'h1' }, 'New job', h('span', { class: 'accent' }, '.')));
  page.appendChild(h('div', { class: 'label mt-12' }, `STEP ${state.newJobStep} OF 2`));

  if (state.newJobStep === 1) page.appendChild(renderStep1());
  else page.appendChild(renderStep2());

  root.appendChild(page);
}

function renderStep1() {
  const wrap = h('div', { class: 'mt-24' });

  // Repeat customer shortcut
  const completed = state.data.jobs.filter((j) => j.completed && j.customerName);
  const lastCustomers = {};
  completed.forEach((j) => {
    if (!lastCustomers[j.customerName]) lastCustomers[j.customerName] = j;
  });
  const repeats = Object.values(lastCustomers).slice(0, 3);
  if (repeats.length > 0) {
    wrap.appendChild(h('div', { class: 'section-label' }, 'REPEAT FROM'));
    repeats.forEach((j) => {
      wrap.appendChild(h('button', {
        class: 'btn full',
        style: { justifyContent: 'flex-start', marginBottom: '6px', padding: '10px 14px' },
        onClick: () => setState((s) => {
          s.newJobData = { ...s.newJobData, package: j.package, addons: [...j.addons], customerName: j.customerName, customerPhone: j.customerPhone, carInfo: j.carInfo };
        }),
      },
        h('span', { style: { color: 'var(--text)' } }, j.customerName),
        h('span', { style: { color: 'var(--text-mute)', marginLeft: 'auto', fontSize: '10px' } }, `$${j.total}`),
      ));
    });
    wrap.appendChild(h('div', { style: { height: '24px' } }));
  }

  wrap.appendChild(h('div', { class: 'section-label' }, 'PACKAGE'));
  Object.entries(PACKAGES).forEach(([key, pkg]) => {
    const selected = state.newJobData.package === key;
    wrap.appendChild(h('button', {
      class: 'card' + (selected ? ' hi' : ''),
      style: { width: '100%', padding: '18px', marginBottom: '10px', cursor: 'pointer', textAlign: 'left', border: `1px solid ${selected ? 'var(--accent)' : 'var(--border)'}` },
      onClick: () => setState((s) => { s.newJobData.package = key; }),
    },
      h('div', { class: 'row', style: { alignItems: 'flex-start' } },
        h('div', {},
          h('div', { class: 'h2' }, pkg.label),
          h('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--text-dim)', marginTop: '4px', letterSpacing: '1px' } }, `~${pkg.estMinutes} MIN`),
        ),
        h('div', { class: 'serif', style: { fontSize: '22px', fontWeight: '500' } }, `$${pkg.price}`),
      ),
    ));
  });

  wrap.appendChild(h('div', { class: 'section-label mt-24' }, 'ADD-ONS (OPTIONAL)'));
  Object.entries(ADDONS).forEach(([key, a]) => {

    wrap.appendChild(h('button', {
      class: 'card' + (sel ? ' hi' : ''),

      onClick: () => setState((s) => {
        const i = s.newJobData.addons.indexOf(key);
        if (i >= 0) s.newJobData.addons.splice(i, 1);
        else s.newJobData.addons.push(key);
      }),
    },
      h('div', {},
        h('div', { style: { fontSize: '14px' } }, a.label),
        h('div', { class: 'mono', style: { fontSize: '9px', color: 'var(--text-mute)', marginTop: '2px', letterSpacing: '1px' } }, `+$${a.price} · ~${a.estMinutes}M`),
      ),
      h('div', { class: 'check' + (sel ? ' checked' : '') }, sel ? '✓' : ''),
    ));
  });

  if (state.newJobData.package) {
    const total = [state.newJobData.package, ...state.newJobData.addons].reduce((s, k) => s + ALL[k].price, 0);
    const estMin = [state.newJobData.package, ...state.newJobData.addons].reduce((s, k) => s + ALL[k].estMinutes, 0);

    wrap.appendChild(h('div', {
      style: { position: 'fixed', bottom: '78px', left: 0, right: 0, background: 'var(--bg)', borderTop: '1px solid var(--border)', padding: '14px 20px', paddingBottom: 'calc(14px + env(safe-area-inset-bottom))', zIndex: 50 },
    },

          h('div', { class: 'serif', style: { fontSize: '24px', fontWeight: '500' } }, `$${total}`)),
        h('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--text-dim)' } }, `~${Math.floor(estMin / 60)}H ${estMin % 60}M`),
      ),

  return wrap;

  const wrap = h('div', { class: 'mt-24' });
  wrap.appendChild(h('div', { class: 'section-label' }, 'CUSTOMER (OPTIONAL)'));

  const inputs = [
    { key: 'customerName', placeholder: 'Name', type: 'text' },
    { key: 'customerPhone', placeholder: 'Phone', type: 'tel' },

  });

  const confirm = h('div', { class: 'card mt-32', style: { padding: '20px' } });

    ALL[state.newJobData.package].label,
    ...state.newJobData.addons.map((a) => h('div', { style: { fontSize: '11px', color: 'var(--text-mute)', marginTop: '2px' } }, `+ ${ALL[a].label}`))));

    h('button', { class: 'btn primary', style: { flex: 2, padding: '16px' }, onClick: createAndStartJob }, 'START JOB →'),
  ));

function createAndStartJob() {
  const services = [state.newJobData.package, ...state.newJobData.addons];
  const total = services.reduce((s, k) => s + ALL[k].price, 0);
  const job = {
    id: `job-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
    package: state.newJobData.package,
    addons: state.newJobData.addons,
    customerName: state.newJobData.customerName,
    customerPhone: state.newJobData.customerPhone,
    carInfo: state.newJobData.carInfo,
    notes: state.newJobData.notes || '',
    total,
    tip: 0,
    paid: null, // null = not finished, true/false after complete
    createdAt: Date.now(),
    durationSecs: 0,
    checked: buildChecked(services),
    photos: [],
    completed: false,
  };
  state.data.jobs.unshift(job);
  state.showNewJob = false;
  openActiveJob(job);
}

// ════════════════════════════════════════════════════════════════════
// ACTIVE JOB
// ════════════════════════════════════════════════════════════════════
let jobTimerInterval = null;
function startJobTimer() {
  clearInterval(jobTimerInterval);
  if (!state.activeJob || !state.activeJob._running) return;
  jobTimerInterval = setInterval(() => {
    if (!state.activeJob) { clearInterval(jobTimerInterval); return; }
    state.activeJob._timerSecs += 1;
    const j = state.data.jobs.find((x) => x.id === state.activeJob.id);
    if (j) j.durationSecs = state.activeJob._timerSecs;

function handlePhoto(e, job) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const max = 800;
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const w = img.width * scale, hgt = img.height * scale;
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = hgt;
      canvas.getContext('2d').drawImage(img, 0, 0, w, hgt);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      job.photos = job.photos || [];
      job.photos.push({ id: `p${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, data: compressed, ts: Date.now() });
      const j = state.data.jobs.find((x) => x.id === job.id);
      if (j) j.photos = job.photos;
      save();
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

let map = null;
let radiusCircle = null;
let homeMarker = null;
let meMarker = null;
let streetLayers = {};
let pinMarkers = {};
let mapInited = false;

function ensureMap() {
  if (mapInited) return;
  mapInited = true;

  map = L.map('map-leaflet', { zoomControl: false }).setView([39.5, -98.35], 4);
  L.control.zoom({ position: 'topleft' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap'
  }).addTo(map);

  const r = state.data.route;
  if (r.home) {
    map.setView([r.home.lat, r.home.lng], 15);
    placeHomeMarker(r.home.lat, r.home.lng);
    updateRadiusCircle();
    r.streets.forEach(drawStreet);
    r.pins.forEach(drawPin);
  }

  map.on('click', (e) => {
    const m = state.routeMode;
    if (m === 'home') {
      state.data.route.home = { lat: e.latlng.lat, lng: e.latlng.lng };
      placeHomeMarker(e.latlng.lat, e.latlng.lng);
      updateRadiusCircle();
      save();
      updateStatsDisplay();
    } else if (m === 'customer') {
      addPin(e.latlng.lat, e.latlng.lng, 'customer');
    } else if (m === 'followup') {
      addPin(e.latlng.lat, e.latlng.lng, 'followup');
    }
  });

  // Try geolocate to center map
  if (!r.home && navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => map.setView([pos.coords.latitude, pos.coords.longitude], 15),
      () => {}, { timeout: 5000, maximumAge: 60000 }
    );
  }
}

function updateStatsDisplay() {
  const r = state.data.route;
  const total = r.streets.length;
  const sDone = r.streets.filter((x) => x.status === 'done').length;
  const sSkip = r.streets.filter((x) => x.status === 'skip').length;
  const els = ['rs-total', 'rs-done', 'rs-skip', 'rs-left'].map((id) => document.getElementById(id));
  if (els[0]) els[0].textContent = total;
  if (els[1]) els[1].textContent = sDone;
  if (els[2]) els[2].textContent = sSkip;
  if (els[3]) els[3].textContent = total - sDone - sSkip;
}

function placeHomeMarker(lat, lng) {
  if (homeMarker) map.removeLayer(homeMarker);
  homeMarker = L.marker([lat, lng], {
    icon: L.divIcon({ className: '', html: '<div class="pin-dot pin-home"></div>', iconSize: [18, 18], iconAnchor: [9, 9] }),
  }).addTo(map);
}

function updateRadiusCircle() {
  if (!map) return;
  const r = state.data.route;
  if (!r.home) return;
  if (radiusCircle) map.removeLayer(radiusCircle);
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  radiusCircle = L.circle([r.home.lat, r.home.lng], {
    radius: r.radius * 1609.34,
    color: accent, weight: 1, fillColor: accent, fillOpacity: 0.04, dashArray: '4,4',
  }).addTo(map);
}

function locateMe() {
  if (!navigator.geolocation) { toast('GEOLOCATION NOT AVAILABLE'); return; }
  toast('FINDING LOCATION', 0, true);
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      hideToast();
      const { latitude, longitude } = pos.coords;
      if (meMarker) map.removeLayer(meMarker);
      meMarker = L.marker([latitude, longitude], {
        icon: L.divIcon({ className: '', html: '<div class="pin-me"></div>', iconSize: [24, 24], iconAnchor: [12, 12] }),
      }).addTo(map);
      map.flyTo([latitude, longitude], 16, { duration: 0.8 });
    },
    (err) => {
      hideToast();
      toast(err.message || 'COULD NOT GET LOCATION', 2500);
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

const OVERPASS_SERVERS = [
  "https://overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter",
  "https://overpass.osm.ch/api/interpreter",
];

async function fetchWithTimeout(url, opts, ms) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  try {
    const res = await fetch(url, { ...opts, signal: controller.signal });
    return res;
  } finally {
    clearTimeout(id);
  }
}

async function loadStreets() {
  const r = state.data.route;
  if (!r.home) { toast('Set HOME first by tapping the map', 2500); return; }
  toast('Loading streets', 0, true);

  const tryRadius = async (radiusMi) => {
    const meters = radiusMi * 1609.34;
    const query = `[out:json][timeout:25];
(way["highway"~"^(residential|tertiary|secondary|unclassified|living_street|primary)$"](around:${meters},${r.home.lat},${r.home.lng}););
out geom;`;

    for (const server of OVERPASS_SERVERS) {
      try {
        const res = await fetchWithTimeout(server, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'data=' + encodeURIComponent(query),
        }, 20000);
        if (!res.ok) continue;
        return await res.json();
      } catch (e) { /* try next */ }
    }
    return null;
  };

  let data = await tryRadius(r.radius);

  // Auto-retry with smaller radius if fail and radius > 0.25
  if (!data && r.radius > 0.5) {
    toast('Retrying with smaller area', 0, true);
    data = await tryRadius(0.5);
    if (data) {
      state.data.route.radius = 0.5;
      updateRadiusCircle();
    }
  }
  if (!data && r.radius > 0.25) {
    toast('Last try, smaller area', 0, true);
    data = await tryRadius(0.25);
    if (data) {
      state.data.route.radius = 0.25;
      updateRadiusCircle();
    }
  }

  hideToast();
  if (!data) {
    toast('FAILED. Check internet or try later', 3500);
    return;
  }

  Object.values(streetLayers).forEach((l) => map.removeLayer(l));
  streetLayers = {};
  state.data.route.streets = [];

  data.elements.forEach((elem) => {
    if (!elem.geometry) return;
    const coords = elem.geometry.map((p) => [p.lat, p.lon]);
    const midIdx = Math.floor(coords.length / 2);
    const street = {
      id: elem.id, status: 'open', coords, midpoint: coords[midIdx],
      name: elem.tags?.name || 'Unnamed',
    };
    state.data.route.streets.push(street);
    drawStreet(street);
  });

  save();
  updateStatsDisplay();
  // Update slider too in case auto-reduced
  const slider = document.querySelector('input[type="range"]');
  if (slider) {
    slider.value = String(state.data.route.radius);
    const rval = document.getElementById('r-val');
    if (rval) rval.textContent = `${state.data.route.radius} MI`;
  }
  toast(`Loaded ${state.data.route.streets.length} streets`, 2000);
}

function streetStyle(s) {
  const map = { open: '#888', done: '#444', skip: '#b91c1c', next: '#d97706' };
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  const red = getComputedStyle(document.documentElement).getPropertyValue('--red').trim();
  const colors = { open: '#888', done: '#444', skip: red, next: accent };
  return {
    color: colors[s.status] || '#888',
    weight: s.status === 'next' ? 6 : 4,
    opacity: s.status === 'done' ? 0.4 : 0.9,
    lineCap: 'round',
  };
}

function drawStreet(s) {
  if (streetLayers[s.id]) map.removeLayer(streetLayers[s.id]);
  const line = L.polyline(s.coords, streetStyle(s)).addTo(map);
  line.on('click', () => {
    const m = state.routeMode;
    if (m !== 'done' && m !== 'skip') {
      toast('Switch to DONE or SKIP mode', 1500);
      return;
    }
    s.status = s.status === m ? 'open' : m;
    drawStreet(s);
    save();
    updateStatsDisplay();
  });
  streetLayers[s.id] = line;
}

function addPin(lat, lng, type) {
  const id = `pin-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
  const pin = { id, type, lat, lng };
  state.data.route.pins.push(pin);
  drawPin(pin);
  save();
}

function drawPin(pin) {
  const cls = pin.type === 'customer' ? 'pin-customer' : 'pin-followup';
  const marker = L.marker([pin.lat, pin.lng], {
    icon: L.divIcon({ className: '', html: `<div class="pin-dot ${cls}"></div>`, iconSize: [14, 14], iconAnchor: [7, 7] }),
  }).addTo(map);
  marker.on('click', () => {
    if (confirm('Remove this pin?')) {
      map.removeLayer(marker);
      state.data.route.pins = state.data.route.pins.filter((p) => p.id !== pin.id);
      delete pinMarkers[pin.id];
      save();
    }
  });
  pinMarkers[pin.id] = marker;
}

function findNextStreet() {
  const r = state.data.route;
  if (!r.home) { toast('Set HOME first', 2000); return; }
  if (r.streets.length === 0) { toast('LOAD STREETS FIRST', 2000); return; }
  const open = r.streets.filter((s) => s.status === 'open' || s.status === 'next');
  if (open.length === 0) { toast('All streets done. Nice work.', 2500); return; }

  r.streets.forEach((s) => { if (s.status === 'next') { s.status = 'open'; drawStreet(s); } });

  let nearest = null, minD = Infinity;
  open.forEach((s) => {
    const d = Math.hypot(r.home.lat - s.midpoint[0], r.home.lng - s.midpoint[1]);
    if (d < minD) { minD = d; nearest = s; }
  });
  if (nearest) {
    nearest.status = 'next';
    drawStreet(nearest);
    map.flyTo(nearest.midpoint, 17, { duration: 1 });
    toast(`Next: ${nearest.name}`, 2500);
    save();
  }
}

function resetRouteProgress() {
  if (!confirm('Reset street progress? Home and pins stay.')) return;
  state.data.route.streets.forEach((s) => { s.status = 'open'; drawStreet(s); });
  save();
  updateStatsDisplay();
}

// ════════════════════════════════════════════════════════════════════
// MORE
// ════════════════════════════════════════════════════════════════════
function renderMore(root) {
  const page = h('div', { class: 'page' });
  page.appendChild(h('div', { class: 'label' }, 'SETTINGS'));
  page.appendChild(h('div', { class: 'h1' }, 'More', h('span', { class: 'accent' }, '.')));

  // Themes
  page.appendChild(h('div', { class: 'section-label mt-24' }, 'THEME'));
  const grid = h('div', { class: 'theme-grid' });
  Object.entries(THEMES).forEach(([key, t]) => {
    const active = state.theme === key;
    grid.appendChild(h('button', {
      class: 'theme-card' + (active ? ' active' : ''),
      onClick: () => setState({ theme: key }),
    },
      h('div', { class: 'check-dot' }),
      h('div', { class: 'theme-name', style: { fontFamily: t.vars['--serif'] } }, t.name),
      h('div', { class: 'theme-desc' }, t.desc),
      h('div', { class: 'theme-swatches' },
        h('div', { class: 'swatch', style: { background: t.vars['--bg'] } }),
        h('div', { class: 'swatch', style: { background: t.vars['--surface'] } }),
        h('div', { class: 'swatch', style: { background: t.vars['--text'] } }),
        h('div', { class: 'swatch', style: { background: t.vars['--accent'] } })),
    ));
  });
  page.appendChild(grid);

  // Earnings detail
  const completed = state.data.jobs.filter((j) => j.completed);
  const paid = completed.filter((j) => j.paid !== false);
  const totalEarned = paid.reduce((s, j) => s + j.total + (j.tip || 0), 0);
  const owed = completed.filter((j) => j.paid === false).reduce((s, j) => s + j.total + (j.tip || 0), 0);
  const remaining = Math.max(0, state.data.goal - totalEarned);
  const avgCar = completed.length > 0 ? Math.round((totalEarned + owed) / completed.length) : 0;
  const carsToGo = avgCar > 0 ? Math.ceil(remaining / avgCar) : 0;
  const totalTips = completed.reduce((s, j) => s + (j.tip || 0), 0);

  page.appendChild(h('div', { class: 'section-label mt-32' }, 'EARNINGS'));
  page.appendChild(h('div', { class: 'card', style: { padding: '20px' } },
    h('div', { class: 'label' }, 'EARNED (PAID)'),
    h('div', { class: 'serif', style: { fontSize: '36px', fontWeight: 500, letterSpacing: '-0.5px', marginTop: '4px' } }, `$${totalEarned}`),
    h('div', { class: 'mono', style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' } },
      `${completed.length} cars · $${avgCar} avg · $${totalTips} tips`),
    owed > 0 ? h('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--red)', marginTop: '6px', letterSpacing: '1px' } }, `$${owed} OWED`) : null,
    avgCar > 0 && remaining > 0 ? h('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--text-mute)', marginTop: '4px', letterSpacing: '1px' } }, `~${carsToGo} MORE CARS TO GOAL`) : null,
  ));

  // Goal editor
  page.appendChild(h('div', { class: 'section-label mt-32' }, 'GOAL'));
  const goalName = h('input', { type: 'text', placeholder: 'Goal name', value: state.data.goalName });
  goalName.addEventListener('input', (e) => { state.data.goalName = e.target.value; save(); });
  page.appendChild(goalName);
  const goalAmt = h('input', { type: 'number', placeholder: 'Dollar amount', value: String(state.data.goal) });
  goalAmt.addEventListener('input', (e) => { state.data.goal = parseInt(e.target.value) || 0; save(); });
  page.appendChild(goalAmt);

  // Unpaid jobs
  const unpaid = completed.filter((j) => j.paid === false);
  if (unpaid.length > 0) {
    page.appendChild(h('div', { class: 'section-label mt-32' }, 'UNPAID JOBS'));
    unpaid.forEach((j) => {
      page.appendChild(h('div', { class: 'card', style: { padding: '12px 14px', marginBottom: '6px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
        h('div', {},
          h('div', { style: { fontSize: '13px' } }, j.customerName || 'Unnamed'),
          h('div', { class: 'mono', style: { fontSize: '10px', color: 'var(--text-mute)', letterSpacing: '1px', marginTop: '2px' } }, `${fmtDate(j.createdAt)} · $${j.total + (j.tip || 0)}`)),
        h('button', { class: 'btn', style: { padding: '8px 14px', fontSize: '9px' }, onClick: () => {
          j.paid = true;
          save();
          render();
        } }, 'MARK PAID'),
      ));
    });
  }

  // Service breakdown
  if (completed.length > 0) {
    const stats = {};
    completed.forEach((j) => {
      [j.package, ...j.addons].forEach((sk) => {
        if (!stats[sk]) stats[sk] = { count: 0, totalSecs: 0 };
        stats[sk].count += 1;
      });
      stats[j.package].totalSecs += j.durationSecs;
    });

    page.appendChild(h('div', { class: 'section-label mt-32' }, 'SERVICE BREAKDOWN'));
    Object.entries(stats).forEach(([sk, st]) => {
      const s = ALL[sk];
      const avgTime = st.totalSecs > 0 ? Math.round(st.totalSecs / st.count) : null;
      page.appendChild(h('div', { style: { padding: '12px 0', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
        h('div', {},
          h('div', { style: { fontSize: '13px' } }, s.label),
          avgTime ? h('div', { class: 'mono', style: { fontSize: '9px', color: 'var(--text-mute)', letterSpacing: '1px', marginTop: '2px' } }, `AVG ${fmtDur(avgTime)} · EST ${s.estMinutes}M`) : null),
        h('div', { class: 'mono', style: { fontSize: '12px', color: 'var(--accent)' } }, `×${st.count}`),
      ));
    });
  }

  // Supplies
  page.appendChild(h('div', { class: 'section-label mt-32' }, 'SUPPLIES'));
  const lowCount = state.data.supplies.filter((s) => s.lowStock).length;
  if (lowCount > 0) {
    page.appendChild(h('div', { class: 'card', style: { padding: '12px 14px', borderColor: 'var(--red)', color: 'var(--red)', fontFamily: 'var(--mono)', fontSize: '11px', letterSpacing: '1px', marginBottom: '12px' } },
      `${lowCount} ${lowCount === 1 ? 'ITEM' : 'ITEMS'} LOW`));
  }

  const newItemInput = h('input', { type: 'text', placeholder: 'Add supply...' });
  const addItem = () => {
    if (!newItemInput.value.trim()) return;
    state.data.supplies.push({ id: `s${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, name: newItemInput.value, lowStock: false });
    newItemInput.value = '';
    save(); render();
  };
  newItemInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addItem(); });
  page.appendChild(h('div', { style: { display: 'flex', gap: '8px', marginBottom: '14px' } },
    newItemInput,
    h('button', { class: 'btn primary', style: { padding: '0 18px' }, onClick: addItem }, 'ADD')));

  state.data.supplies.forEach((s) => {
    page.appendChild(h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 0', borderBottom: '1px solid var(--border)' } },
      h('button', {
        class: 'check',
        style: { border: `1px solid ${s.lowStock ? 'var(--red)' : 'var(--border-hi)'}`, background: s.lowStock ? 'var(--red)' : 'none', color: '#fff' },
        onClick: () => { s.lowStock = !s.lowStock; save(); render(); },
      }, s.lowStock ? '!' : ''),
      h('div', { style: { flex: 1, fontSize: '13px', color: s.lowStock ? 'var(--red)' : 'var(--text)' } }, s.name),
      h('button', {
        style: { background: 'none', border: 'none', color: 'var(--text-mute)', fontSize: '18px', cursor: 'pointer', padding: '4px 8px' },
        onClick: () => { state.data.supplies = state.data.supplies.filter((x) => x.id !== s.id); save(); render(); },
      }, '×')));
  });

  // Backup
  page.appendChild(h('div', { class: 'section-label mt-32' }, 'BACKUP'));
  page.appendChild(h('button', {
    class: 'btn full', style: { marginBottom: '8px' },
    onClick: exportData,
  }, 'EXPORT DATA (BACKUP)'));

  const importInput = h('input', { type: 'file', accept: '.json,application/json', style: { display: 'none' } });
  importInput.addEventListener('change', (e) => importData(e.target.files[0]));
  page.appendChild(importInput);
  page.appendChild(h('button', {
    class: 'btn full',
    onClick: () => importInput.click(),
  }, 'IMPORT DATA (RESTORE)'));

  // Reset all
  page.appendChild(h('div', { class: 'section-label mt-32' }, 'DANGER'));
  page.appendChild(h('button', {
    class: 'btn full danger',
    onClick: async () => {
      if (!confirm('Delete ALL data? Export first if you want a backup.')) return;
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      state = defaultState();
      mapInited = false;
      streetLayers = {};
      pinMarkers = {};
      if (map) { map.remove(); map = null; }
      // Recreate map container content
      const mc = document.getElementById('map-container');
      mc.innerHTML = '<div id="map-leaflet"></div>';
      render();
      toast('ALL DATA DELETED', 2000);
    },
  }, 'RESET EVERYTHING'));

  root.appendChild(page);
}

function exportData() {
  const blob = new Blob([JSON.stringify({ theme: state.theme, data: state.data, exportedAt: Date.now() }, null, 2)],
    { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `detail-co-backup-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('BACKUP DOWNLOADED', 2000);
}

function importData(file) {
  if (!file) return;
  if (!confirm('This will REPLACE all current data. Continue?')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (parsed.data) {
        state.data = { ...defaultState().data, ...parsed.data };
        if (parsed.theme) state.theme = parsed.theme;
        save();
        render();
        toast('DATA RESTORED', 2000);
      } else throw new Error('Invalid file');
    } catch (err) {
      toast('IMPORT FAILED: ' + (err.message || 'bad file'), 3000);
    }
  };
  reader.readAsText(file);
}
